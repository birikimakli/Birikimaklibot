name: BirikimAkliBot

on:
  workflow_dispatch: # İstediğimiz zaman manuel çalıştırmak için
  schedule:
    - cron: '*/15 * * * *' # Her 15 dakikada bir otomatik çalışması için

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Run Bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py
